name: Keep Supabase project awake

on:
  schedule:
    # Every 3 days — comfortably inside Supabase's 7-day pause-on-inactivity
    # window, with margin either side.
    - cron: '0 6 */3 * *'
  workflow_dispatch: {} # lets you trigger a manual run to test the setup

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/saves?select=user_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null
